<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure - Penguin Buddy</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  body { margin: 0; font-family: 'Segoe UI', sans-serif; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const PenguinKid = ({ mood, size = 120 }) => {
  const s = size / 120;
  return (
    <div style={{ transform: `scale(${s})`, transformOrigin: "center bottom", width: 120, height: 150, position: "relative", margin: "0 auto" }}>
      <div style={{ position: "absolute", bottom: 0, left: 15, width: 90, height: 100, background: "linear-gradient(180deg, #2D2D2D 0%, #1A1A1A 100%)", borderRadius: "45px 45px 35px 35px", border: "3px solid #111" }}>
        <div style={{ position: "absolute", top: 18, left: 15, width: 58, height: 70, background: "linear-gradient(180deg, #FFFFFF 0%, #F0F0F0 100%)", borderRadius: "50% 50% 45% 45%", border: "2px solid #DDD" }} />
      </div>
      <div style={{ position: "absolute", top: 0, left: 18, width: 84, height: 72, background: "linear-gradient(180deg, #2D2D2D 0%, #222 100%)", borderRadius: "42px 42px 30px 30px", border: "3px solid #111", zIndex: 2 }}>
        <div style={{ position: "absolute", bottom: -2, left: 10, width: 62, height: 48, background: "#FFF", borderRadius: "50% 50% 40% 40%", border: "2px solid #EEE" }}>
          <div style={{ position: "absolute", top: 4, left: 5, width: 52, height: 40, background: "linear-gradient(180deg, #FDDCB5 0%, #F5C99D 100%)", borderRadius: "50%", overflow: "hidden" }}>
            <div style={{ position: "absolute", top: -2, left: 8, width: 36, height: 14, background: "#8B5E3C", borderRadius: "50% 50% 0 0" }} />
            <div style={{ position: "absolute", top: -4, left: 20, width: 14, height: 16, background: "#8B5E3C", borderRadius: "50%", transform: "rotate(15deg)" }} />
            <div style={{ position: "absolute", top: 14, left: 10, width: mood === "sad" ? 8 : 10, height: mood === "happy" ? 5 : (mood === "sad" ? 6 : 10), background: "#333", borderRadius: mood === "happy" ? "10px 10px 0 0" : "50%", overflow: "hidden" }}>
              {mood !== "happy" && <div style={{ position: "absolute", top: 1, left: 3, width: 4, height: 4, background: "#FFF", borderRadius: "50%" }} />}
            </div>
            <div style={{ position: "absolute", top: 14, left: 32, width: mood === "sad" ? 8 : 10, height: mood === "happy" ? 5 : (mood === "sad" ? 6 : 10), background: "#333", borderRadius: mood === "happy" ? "10px 10px 0 0" : "50%", overflow: "hidden" }}>
              {mood !== "happy" && <div style={{ position: "absolute", top: 1, left: 3, width: 4, height: 4, background: "#FFF", borderRadius: "50%" }} />}
            </div>
            <div style={{ position: "absolute", top: 22, left: 4, width: 12, height: 8, background: "#FFB5B5", borderRadius: "50%", opacity: 0.7 }} />
            <div style={{ position: "absolute", top: 22, left: 36, width: 12, height: 8, background: "#FFB5B5", borderRadius: "50%", opacity: 0.7 }} />
            {mood === "happy" ? (
              <div style={{ position: "absolute", top: 28, left: 16, width: 18, height: 9, borderBottom: "3px solid #C27A5A", borderRadius: "0 0 50% 50%" }} />
            ) : mood === "sad" ? (
              <div style={{ position: "absolute", top: 30, left: 19, width: 12, height: 6, borderTop: "2px solid #C27A5A", borderRadius: "50% 50% 0 0" }} />
            ) : (
              <div style={{ position: "absolute", top: 30, left: 21, width: 10, height: 2, background: "#C27A5A", borderRadius: 2 }} />
            )}
          </div>
        </div>
        <div style={{ position: "absolute", top: 14, left: 32, width: 18, height: 10, background: "#F5A623", borderRadius: "50% 50% 50% 50% / 30% 30% 70% 70%", border: "2px solid #D4820F", zIndex: 3 }} />
        <div style={{ position: "absolute", top: 8, left: 24, width: 8, height: 8, background: "#FFF", borderRadius: "50%", border: "2px solid #111" }}>
          <div style={{ position: "absolute", top: 2, left: 2, width: 4, height: 4, background: "#111", borderRadius: "50%" }} />
        </div>
        <div style={{ position: "absolute", top: 8, left: 50, width: 8, height: 8, background: "#FFF", borderRadius: "50%", border: "2px solid #111" }}>
          <div style={{ position: "absolute", top: 2, left: 2, width: 4, height: 4, background: "#111", borderRadius: "50%" }} />
        </div>
        <div style={{ position: "absolute", top: -6, left: 38, width: 8, height: 14, background: "#8B5E3C", borderRadius: "4px 4px 0 0", transform: "rotate(10deg)" }} />
      </div>
      <div style={{ position: "absolute", top: 60, left: 0, width: 20, height: 40, background: "linear-gradient(180deg, #2D2D2D 0%, #1A1A1A 100%)", borderRadius: "40% 20% 50% 40%", border: "2px solid #111", transform: mood === "happy" ? "rotate(-35deg)" : "rotate(-10deg)", transformOrigin: "top right", transition: "transform 0.3s" }} />
      <div style={{ position: "absolute", top: 60, right: 0, width: 20, height: 40, background: "linear-gradient(180deg, #2D2D2D 0%, #1A1A1A 100%)", borderRadius: "20% 40% 40% 50%", border: "2px solid #111", transform: mood === "happy" ? "rotate(35deg)" : "rotate(10deg)", transformOrigin: "top left", transition: "transform 0.3s" }} />
      <div style={{ position: "absolute", bottom: -6, left: 22, width: 26, height: 12, background: "#F5A623", borderRadius: "50% 50% 40% 40%", border: "2px solid #D4820F" }} />
      <div style={{ position: "absolute", bottom: -6, right: 22, width: 26, height: 12, background: "#F5A623", borderRadius: "50% 50% 40% 40%", border: "2px solid #D4820F" }} />
    </div>
  );
};

const Snowflake = ({ style: s }) => (
  <div style={{ position: "absolute", color: "#fff", fontSize: s.size || 16, opacity: 0.7, animation: `snowFall ${s.dur}s linear infinite`, animationDelay: `${s.delay}s`, left: `${s.left}%`, top: -20, ...s }}>❄</div>
);

const Confetti = () => {
  const colors = ["#FF6B6B", "#FFE66D", "#4ECDC4", "#45B7D1", "#96E6A1", "#DDA0DD"];
  return (
    <div style={{ position: "fixed", top: 0, left: 0, width: "100%", height: "100%", pointerEvents: "none", zIndex: 100 }}>
      {Array.from({ length: 24 }, (_, i) => (
        <div key={i} style={{
          position: "absolute", top: -10, left: `${Math.random() * 100}%`,
          width: 6 + Math.random() * 6, height: 6 + Math.random() * 6,
          background: colors[i % colors.length],
          borderRadius: Math.random() > 0.5 ? "50%" : "2px",
          animation: `confettiFall ${1 + Math.random()}s ease-in ${Math.random() * 0.5}s forwards`
        }} />
      ))}
      <style>{`@keyframes confettiFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }`}</style>
    </div>
  );
};

const snowflakes = Array.from({ length: 12 }, (_, i) => ({
  left: Math.random() * 100, dur: 4 + Math.random() * 6, delay: Math.random() * 5, size: 10 + Math.random() * 14
}));

const TOTAL_Q = 50;

const genQuestion = () => {
  const ranges = [20, 50, 100];
  const max = ranges[Math.floor(Math.random() * ranges.length)];
  const ops = ["+", "−", "×", "÷"];
  const op = ops[Math.floor(Math.random() * ops.length)];

  if (op === "+") {
    let a = Math.floor(Math.random() * max) + 1;
    let b = Math.floor(Math.random() * (max - a)) + 1;
    return { a, b, op, answer: a + b };
  }
  if (op === "−") {
    let a = Math.floor(Math.random() * max) + 1;
    let b = Math.floor(Math.random() * a) + 1;
    return { a, b, op, answer: a - b };
  }
  if (op === "×") {
    const limit = max <= 20 ? 5 : max <= 50 ? 10 : 12;
    let a = Math.floor(Math.random() * limit) + 1;
    let b = Math.floor(Math.random() * limit) + 1;
    return { a, b, op, answer: a * b };
  }
  const limit = max <= 20 ? 5 : max <= 50 ? 10 : 12;
  let b = Math.floor(Math.random() * limit) + 1;
  let answer = Math.floor(Math.random() * limit) + 1;
  let a = b * answer;
  return { a, b, op, answer };
};

const BG_MENU = "linear-gradient(180deg, #B3D9F2 0%, #D6EAF8 30%, #E8F4FD 60%, #F0F8FF 100%)";
const BG_PLAY = "linear-gradient(180deg, #C5E3F6 0%, #E0F0FA 50%, #F0F8FF 100%)";

function MathGame() {
  const [screen, setScreen] = useState("menu");
  const [question, setQuestion] = useState(null);
  const [input, setInput] = useState("");
  const [qNum, setQNum] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [stars, setStars] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [showConfetti, setShowConfetti] = useState(false);
  const [mascotMood, setMascotMood] = useState("neutral");
  const [bounce, setBounce] = useState(false);

  const startGame = () => {
    setScore(0); setStreak(0); setBestStreak(0); setStars(0);
    setQNum(1); setInput(""); setFeedback(null);
    setMascotMood("neutral");
    setQuestion(genQuestion());
    setScreen("play");
  };

  const handleNumPad = (val) => {
    if (feedback) return;
    if (val === "DEL") setInput(p => p.slice(0, -1));
    else if (val === "OK") { if (input !== "") checkAnswer(); }
    else setInput(p => p.length >= 4 ? p : p + val);
  };

  const checkAnswer = () => {
    const correct = parseInt(input) === question.answer;
    if (correct) {
      const ns = streak + 1;
      setScore(s => s + 1); setStreak(ns);
      if (ns > bestStreak) setBestStreak(ns);
      if (ns % 5 === 0) { setStars(s => s + 1); setShowConfetti(true); setTimeout(() => setShowConfetti(false), 2000); }
      setMascotMood("happy"); setBounce(true); setTimeout(() => setBounce(false), 600);
      setFeedback({ correct: true, msg: ["Great job! 🎉", "Amazing! ⭐", "You're a star! 🌟", "Fantastic! 🚀", "Well done! 💪"][Math.floor(Math.random() * 5)] });
    } else {
      setStreak(0); setMascotMood("sad");
      setInput("");
      setFeedback({ correct: false, msg: "Oops! Try again! 💪" });
      setTimeout(() => { setFeedback(null); setMascotMood("neutral"); }, 1200);
    }
  };

  const nextQuestion = () => {
    if (qNum >= TOTAL_Q) { setScreen("result"); return; }
    setQNum(q => q + 1); setQuestion(genQuestion());
    setInput(""); setFeedback(null); setMascotMood("neutral");
  };

  const diffColor = { default: "#5BC0BE" };

  if (screen === "menu") {
    return (
      <div style={{ minHeight: "100vh", background: BG_MENU, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, position: "relative", overflow: "hidden" }}>
        {snowflakes.map((sf, i) => <Snowflake key={i} style={sf} />)}
        <div style={{ animation: "floatY 2.5s ease-in-out infinite", zIndex: 2 }}>
          <PenguinKid mood="happy" size={160} />
        </div>
        <div style={{ background: "rgba(255,255,255,0.92)", borderRadius: 28, padding: "28px 36px", textAlign: "center", boxShadow: "0 8px 32px rgba(100,150,200,0.15)", marginTop: 24, maxWidth: 360, width: "100%", zIndex: 2 }}>
          <h1 style={{ fontSize: 26, color: "#2C3E50", margin: "0 0 6px" }}>🧮 Math Adventure</h1>
          <p style={{ color: "#7F8C8D", margin: "0 0 22px", fontSize: 15 }}>50 mixed +, −, ×, ÷ questions with your penguin buddy!</p>
          <button onClick={startGame} style={{
            padding: "16px 40px", fontSize: 20, fontWeight: 700, border: "none",
            borderRadius: 16, cursor: "pointer", color: "#fff", background: "#5BC0BE",
            boxShadow: "0 4px 0 #3A9E9C", transition: "transform 0.1s"
          }}
          onMouseDown={e => e.target.style.transform = "translateY(3px)"}
          onMouseUp={e => e.target.style.transform = "translateY(0)"}
          onMouseLeave={e => e.target.style.transform = "translateY(0)"}
          >
            🚀 Start Game
          </button>
        </div>
        <style>{`
          @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
          @keyframes snowFall { 0%{transform:translateY(-20px) rotate(0)} 100%{transform:translateY(100vh) rotate(360deg)} }
        `}</style>
      </div>
    );
  }

  if (screen === "result") {
    const pct = Math.round((score / TOTAL_Q) * 100);
    const msg = pct === 100 ? "PERFECT! 🏆" : pct >= 80 ? "Amazing! 🌟" : pct >= 60 ? "Good job! 💪" : "Keep practicing! 🌱";
    return (
      <div style={{ minHeight: "100vh", background: BG_MENU, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20, position: "relative", overflow: "hidden" }}>
        {pct >= 80 && <Confetti />}
        {snowflakes.map((sf, i) => <Snowflake key={i} style={sf} />)}
        <PenguinKid mood={pct >= 60 ? "happy" : "neutral"} size={130} />
        <div style={{ background: "rgba(255,255,255,0.95)", borderRadius: 28, padding: "28px 36px", textAlign: "center", boxShadow: "0 8px 32px rgba(100,150,200,0.15)", marginTop: 16, maxWidth: 360, width: "100%", zIndex: 2 }}>
          <h2 style={{ fontSize: 24, margin: "0 0 6px", color: "#2C3E50" }}>Game Over!</h2>
          <p style={{ fontSize: 20, fontWeight: 700, color: diffColor.default, margin: "0 0 18px" }}>{msg}</p>
          <div style={{ display: "flex", justifyContent: "center", gap: 24, marginBottom: 18 }}>
            <div><div style={{ fontSize: 30, fontWeight: 700, color: "#5BC0BE" }}>{score}/{TOTAL_Q}</div><div style={{ fontSize: 12, color: "#999" }}>Score</div></div>
            <div><div style={{ fontSize: 30, fontWeight: 700, color: "#FFB347" }}>{bestStreak}</div><div style={{ fontSize: 12, color: "#999" }}>Best Streak</div></div>
            <div><div style={{ fontSize: 28 }}>{"⭐".repeat(stars) || "—"}</div><div style={{ fontSize: 12, color: "#999" }}>Stars</div></div>
          </div>
          <div style={{ display: "flex", gap: 12 }}>
            <button onClick={startGame} style={{ flex: 1, padding: "14px", fontSize: 17, fontWeight: 700, border: "none", borderRadius: 14, cursor: "pointer", color: "#fff", background: "#5BC0BE", boxShadow: "0 4px 0 #3A9E9C" }}>Play Again</button>
            <button onClick={() => setScreen("menu")} style={{ flex: 1, padding: "14px", fontSize: 17, fontWeight: 700, border: "none", borderRadius: 14, cursor: "pointer", color: "#fff", background: "#A8B2BD", boxShadow: "0 4px 0 #8A939D" }}>Menu</button>
          </div>
        </div>
        <style>{`@keyframes snowFall { 0%{transform:translateY(-20px) rotate(0)} 100%{transform:translateY(100vh) rotate(360deg)} }`}</style>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: BG_PLAY, display: "flex", flexDirection: "column", alignItems: "center", padding: "12px 16px", position: "relative", overflow: "hidden" }}>
      {showConfetti && <Confetti />}
      {snowflakes.slice(0, 6).map((sf, i) => <Snowflake key={i} style={{ ...sf, opacity: 0.4 }} />)}

      <div style={{ display: "flex", justifyContent: "space-between", width: "100%", maxWidth: 380, marginBottom: 8, zIndex: 2 }}>
        <div style={{ background: "rgba(255,255,255,0.85)", borderRadius: 12, padding: "5px 12px", fontSize: 13, fontWeight: 600, color: "#555" }}>
          Q {qNum}/{TOTAL_Q}
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ background: "rgba(255,255,255,0.85)", borderRadius: 12, padding: "5px 12px", fontSize: 13, fontWeight: 600 }}>✅ {score}</div>
          <div style={{ background: "rgba(255,255,255,0.85)", borderRadius: 12, padding: "5px 12px", fontSize: 13, fontWeight: 600 }}>🔥 {streak}</div>
          {stars > 0 && <div style={{ background: "rgba(255,255,255,0.85)", borderRadius: 12, padding: "5px 12px", fontSize: 13, fontWeight: 600 }}>⭐ {stars}</div>}
        </div>
      </div>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8, zIndex: 2 }}>
        <div style={{ animation: bounce ? "bounceUp 0.5s ease" : "none" }}>
          <PenguinKid mood={mascotMood} size={85} />
        </div>
        {feedback && (
          <div style={{
            background: feedback.correct ? "#E8F8F5" : "#FFF8E1",
            border: `2px solid ${feedback.correct ? "#5BC0BE" : "#FFB347"}`,
            borderRadius: 16, padding: feedback.correct ? "14px 24px" : "8px 14px",
            fontSize: feedback.correct ? 22 : 14, fontWeight: 700, maxWidth: feedback.correct ? 220 : 190,
            color: feedback.correct ? "#1A7A6D" : "#E65100",
            animation: feedback.correct ? "popIn 0.4s ease" : "fadeIn 0.3s ease",
            textAlign: "center"
          }}>
            {feedback.msg}
          </div>
        )}
      </div>

      <div style={{
        background: "rgba(255,255,255,0.95)", borderRadius: 24, padding: "22px 28px",
        boxShadow: "0 6px 24px rgba(100,150,200,0.1)", textAlign: "center", maxWidth: 380, width: "100%", marginBottom: 12, zIndex: 2
      }}>
        <div style={{ fontSize: 42, fontWeight: 800, color: "#2C3E50", letterSpacing: 3, marginBottom: 10 }}>
          {question?.a} {question?.op} {question?.b} = ?
        </div>
        <div style={{
          background: "#F7F9FC", borderRadius: 16, padding: "10px 20px", fontSize: 34, fontWeight: 700,
          minHeight: 48, display: "flex", alignItems: "center", justifyContent: "center",
          border: feedback ? `3px solid ${feedback.correct ? "#5BC0BE" : "#EF5350"}` : "3px solid #DAE1E7",
          color: feedback ? (feedback.correct ? "#1A7A6D" : "#C62828") : "#2C3E50",
          transition: "border-color 0.3s"
        }}>
          {input || <span style={{ color: "#CCC" }}>?</span>}
        </div>
      </div>

      {!feedback ? (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, maxWidth: 280, width: "100%", zIndex: 2 }}>
          {[1,2,3,4,5,6,7,8,9,0,"DEL","OK"].map(val => (
            <button key={val} onClick={() => handleNumPad(String(val))} style={{
              padding: "14px", fontSize: val === "DEL" || val === "OK" ? 16 : 22,
              fontWeight: 700, border: "none", borderRadius: 14, cursor: "pointer",
              color: val === "OK" ? "#fff" : val === "DEL" ? "#fff" : "#2C3E50",
              background: val === "OK" ? "#5BC0BE" : val === "DEL" ? "#FF8A80" : "#fff",
              boxShadow: `0 3px 0 ${val === "OK" ? "#3A9E9C" : val === "DEL" ? "#E57373" : "#D0D5DA"}`,
              gridColumn: val === 0 ? "1 / 2" : "auto"
            }}>
              {val === "DEL" ? "⌫" : val}
            </button>
          ))}
        </div>
      ) : (
        <button onClick={nextQuestion} style={{
          padding: "14px 44px", fontSize: 20, fontWeight: 700, border: "none",
          borderRadius: 16, cursor: "pointer", color: "#fff",
          background: "#45B7D1", boxShadow: "0 4px 0 #3198B0",
          animation: "fadeIn 0.3s ease", marginTop: 4, zIndex: 2
        }}>
          {qNum >= TOTAL_Q ? "See Results →" : "Next →"}
        </button>
      )}

      <style>{`
        @keyframes bounceUp { 0%{transform:translateY(0)} 30%{transform:translateY(-15px)} 60%{transform:translateY(-5px)} 100%{transform:translateY(0)} }
        @keyframes fadeIn { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
        @keyframes popIn { 0%{opacity:0;transform:scale(0.5)} 60%{transform:scale(1.15)} 100%{opacity:1;transform:scale(1)} }
        @keyframes snowFall { 0%{transform:translateY(-20px) rotate(0)} 100%{transform:translateY(100vh) rotate(360deg)} }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MathGame />);
</script>
</body>
</html>
